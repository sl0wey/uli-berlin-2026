server {
  listen 80 default_server;
  listen [::]:80 default_server;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Single-file static site
  location / {
    try_files $uri /index.html;
  }

  # Cache static assets aggressively (we ship one HTML — fonts/maps are CDN)
  location ~* \.(?:css|js|woff2?|ttf|otf|svg|png|jpg|jpeg|gif|ico)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800, immutable";
  }

  # Tighten security a notch — adjust if you embed this somewhere
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

  # gzip everything text-like
  gzip on;
  gzip_vary on;
  gzip_min_length 256;
  gzip_proxied any;
  gzip_types
    text/plain text/css text/javascript application/javascript
    application/json application/xml image/svg+xml;
}
